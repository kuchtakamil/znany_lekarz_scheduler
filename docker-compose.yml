services:
  scheduler:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./config.toml:/app/config.toml:ro
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Run first-time headful setup via X11 forwarding.
  # Prerequisites on the host:
  #   xhost +local:docker
  # Usage:
  #   docker compose run --rm setup
  setup:
    build: .
    profiles: [setup]
    env_file: .env
    environment:
      - DISPLAY=${DISPLAY:-:0}
    volumes:
      - ./config.toml:/app/config.toml:ro
      - ./data:/app/data
      - /tmp/.X11-unix:/tmp/.X11-unix
    command:
      ["uv", "run", "python", "-m", "znany_lekarz_scheduler.main", "--setup"]
